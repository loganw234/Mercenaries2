; debug-overlay configuration.
; Drop this next to debug_overlay.asi in your game folder.

[overlay]
; Master on/off. Set 0 to load the mod but skip all rendering (the TCP
; server still accepts commands; they just won't be drawn).
enabled = 1

; Column count for the grid layout (1..4).
;   1 = single column, items stack vertically (default)
;   2..4 = grid with that many columns, row-major fill
columns = 1

; Font selection. Any installed Windows font face name works.
; Consolas is monospace and reads well at small sizes.
font_name = Consolas
font_size = 14

; Internal padding (px) around the labels inside the background box.
padding = 8

; Extra horizontal space between columns (px). Only used if columns > 1.
col_spacing = 24

; Extra vertical space between rows beyond font_size (px).
line_spacing = 4

; Background color as 6-digit hex RRGGBB. Alpha is separate.
bg_color  = 000000
bg_alpha  = 0.65

; Default text color as 6-digit hex RRGGBB. Per-label override via the
; COLOR command at runtime.
text_color = FFFFFF

[anchor]
; Where to pin the overlay. One of:
;   top-left, top-right, bottom-left, bottom-right, custom
position = top-left

; Distance from the anchor in pixels. For 'custom' these are absolute
; screen coordinates of the top-left corner.
x = 16
y = 16

[server]
; TCP listener for SET / CLEAR / COLOR / SHOW / HIDE / PING commands.
; Default 127.0.0.1 keeps it local-only. Default port is 27051 (one
; above the Lua bridge's 27050).
host = 127.0.0.1
port = 27051
